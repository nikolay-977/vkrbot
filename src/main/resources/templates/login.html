<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .form-control {
            border-radius: 12px;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            margin-bottom: 20px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .alert {
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: none;
        }
        .demo-credentials {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 25px;
            text-align: center;
        }
        .demo-credentials small {
            color: #666;
            font-size: 13px;
        }
        .demo-credentials .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="bi bi-shield-lock" style="font-size: 48px; color: #667eea;"></i>
        <h2>Добро пожаловать</h2>
        <p>Войдите в панель администратора</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle"></i>
        Неверный email или пароль
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        <i class="bi bi-check-circle"></i>
        Вы успешно вышли из системы
    </div>

    <form method="post" th:action="@{/login}">
        <div class="mb-3">
            <label for="username" class="form-label fw-bold">Email</label>
            <input type="email" class="form-control" id="username" name="username"
                   placeholder="admin@example.com" required autofocus>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label fw-bold">Пароль</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Войти в систему
        </button>
    </form>

    <div class="demo-credentials">
        <span class="badge mb-2">Демо-доступ</span>
        <small class="d-block">Email: <strong>admin@admin.com</strong></small>
        <small>Пароль: <strong>admin123</strong></small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
